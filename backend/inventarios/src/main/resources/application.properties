spring.application.name=inventarios

#Conexion a mysql
spring.datasource.url=jdbc:mysql://localhost:3306/inventario_db?createDatabaseIfNotExists=true
spring.datasource.username=root
spring.datasource.password=1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Config patron de log
logging.pattern.console=[%thread] %-5level: %logger - %msg%n
# configurar nivel de log
loggin.level.root=INFO
#configurar por niveles, por paquetes
#loggin.level.gm.invetarios=DEBUG
spring.main.banner-mode=off
